<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light">
<meta name="supported-color-schemes" content="light">
<title>{% block title %}Kivi Industrial Chemicals{% endblock %}</title>
<style>
  body, table, td { font-family: Georgia, 'Times New Roman', Times, serif; }
  body { margin: 0; padding: 0; background-color: #0D1B2A; }
  img { -ms-interpolation-mode: bicubic; }
  a.btn:hover { background-color: #00A0E0 !important; }
  @media only screen and (max-width: 620px) {
    .container { width: 100% !important; }
    .px { padding-left: 20px !important; padding-right: 20px !important; }
  }
</style>
</head>
<body style="margin:0;padding:0;background-color:#0D1B2A;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#0D1B2A;">
    <tr>
      <td align="center" style="padding:32px 16px;">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" class="container" style="width:600px;max-width:100%;background-color:#ffffff;border-radius:6px;overflow:hidden;">

          <!-- Header -->
          <tr>
            <td align="center" style="background-color:#002040;padding:28px 32px;">
              <img src="{{ site_url }}/logo-horizontal-white.png" width="190" height="54" alt="{{ company_name }}" style="display:block;border:0;border-radius:2px;margin:0 auto 14px;">
              <p style="margin:0;color:#00A0C0;font-size:11px;letter-spacing:2.5px;text-transform:uppercase;font-weight:bold;">{% block eyebrow %}{% endblock %}</p>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td class="px" style="padding:36px 32px;color:#1a2332;font-size:14px;line-height:1.65;">
              {% block content %}{% endblock %}
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td align="center" style="background-color:#040f1c;padding:26px 32px;">
              <p style="margin:0 0 6px;color:#F4F7FA;font-size:13px;font-weight:bold;letter-spacing:0.3px;">{{ company_name }}</p>
              {% if company_address %}
              <p style="margin:0 0 10px;color:#8291a3;font-size:11px;">{{ company_address }}</p>
              {% endif %}
              <p style="margin:0 0 14px;color:#8291a3;font-size:12px;">
                {% if company_email %}<a href="mailto:{{ company_email }}" style="color:#00A0C0;text-decoration:none;">{{ company_email }}</a>{% endif %}
                {% if company_phone %}&nbsp;&nbsp;&middot;&nbsp;&nbsp;<a href="tel:{{ company_phone }}" style="color:#00A0C0;text-decoration:none;">{{ company_phone }}</a>{% endif %}
              </p>
              <p style="margin:0;color:#4a5568;font-size:10px;letter-spacing:0.5px;">
                <a href="{{ site_url }}" style="color:#4a5568;text-decoration:underline;">kivichemicals.com</a>
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
